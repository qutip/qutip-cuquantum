name: Publish qutip-cuquantum to PyPI and TestPyPI

on:
  push:
    branches:
      - main
      - build_action
    tags:
      - v*
  workflow_dispatch:


jobs:
  build_sdist:
    name: Build sdist
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Checkout updated version
        if: github.ref == 'refs/heads/main'
        run: git pull

      - uses: actions/setup-python@v6
        name: Install Python
        with:
          python-version: '3.13'

      - name: Install pip build
        run: python -m pip install build

      - name: Build sdist tarball
        run: python -m build --sdist .

      - uses: actions/upload-artifact@v7
        with:
          name: dist-sdist
          path: dist/*.tar.gz
          if-no-files-found: error


  build_wheels:
    name: Build wheels
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Checkout updated version
        if: github.ref == 'refs/heads/main'
        run: git pull

      - uses: actions/setup-python@v6
        name: Install Python
        with:
          python-version: '3.13'

      - name: Build wheels
        run: pip wheel . --wheel-dir wheelhouse --no-deps

      - name: Upload wheels artifact
        uses: actions/upload-artifact@v7
        with:
          name: dist-wheels
          path: ./wheelhouse/*.whl
          if-no-files-found: error


  publish_to_testpypi:
    name: Publish to TestPyPI
    needs: [build_sdist, build_wheels]
    if: false  # github.ref_type != 'tag' && github.ref_name == 'main'
    runs-on: ubuntu-latest

    environment:
      name: testpypi
      url: https://test.pypi.org/p/qutip-cuquantum
    permissions:
      id-token: write  # IMPORTANT: mandatory for trusted publishing

    steps:
    - name: Download all dist artifacts
      uses: actions/download-artifact@v7
      with:
          pattern: dist-*
          path: dist
          merge-multiple: true # Merge into a single 'dist' directory

    - name: Publish distribution to TestPyPI
      if: github.repository == 'qutip/qutip-cuquantum'
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        repository-url: https://test.pypi.org/legacy/
        verbose: true


  publish_to_pypi:
    name: Publish qutip-cuquantum to PyPI
    if: github.ref_type == 'tag'
    needs: [build_sdist, build_wheels]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/qutip-cuquantum
    permissions:
      id-token: write

    steps:
      - name: Download all dist artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: dist-*
          path: dist
          merge-multiple: true

      - name: Verify this is not a dev version
        shell: bash
        run: |
          ls dist/*.whl
          echo $GITHUB_REF
          if [[ $(ls dist/*.whl) == *dev* ]]; then echo dist/*.whl; exit 1; fi
          if [[ "$GITHUB_REF" == *"main"* ]]; then echo $GITHUB_REF; exit 1; fi

      - name: Publish distribution to PyPI
        if: github.repository == 'qutip/qutip-cuquantum'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true


  github_release:
    name: Create GitHub Release and Sign Artifacts
    needs: publish_to_pypi
    runs-on: ubuntu-latest
    permissions:
      contents: write  # IMPORTANT: mandatory for making GitHub Releases
      id-token: write  # IMPORTANT: mandatory for sigstore

    steps:
      - name: Download all dist artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: dist-*
          path: dist
          merge-multiple: true

      - name: Sign the dists with Sigstore
        uses: sigstore/gh-action-sigstore-python@v3.0.0
        with:
          inputs: >-
            ./dist/*.tar.gz
            ./dist/*.whl

      - name: Upload artifact signatures to GitHub Release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        # Upload to GitHub Release using the `gh` CLI.
        # `dist/` contains the built packages, and the
        # sigstore-produced signatures and certificates.
        run: >-
          gh release upload "$GITHUB_REF_NAME" dist/** --repo "$GITHUB_REPOSITORY"
